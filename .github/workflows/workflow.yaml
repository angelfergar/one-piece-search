name: OP Chapter Pipeline

on:
  schedule:
    - cron: '0 * * * 4,5,6'
  workflow_dispatch:

jobs:
  chapter-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get repo
        uses: actions/checkout@v5

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.10'

      - name: Install Tesseract
        run: sudo apt-get install -y tesseract-ocr

      - name: Check cache venv
        uses: actions/cache@v5
        id: cache-venv
        with:
          path: venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: venv-${{ runner.os }}-


      - name: Finish Python venv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python -m venv venv

      - name: Install dependencies
        run: |
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Install geckodriver
        run: |
            GECKODRIVER_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep tag_name | cut -d '"' -f4)
            curl -L "https://github.com/mozilla/geckodriver/releases/download/${GECKODRIVER_VERSION}/geckodriver-${GECKODRIVER_VERSION}-linux64.tar.gz" -o geckodriver.tar.gz
            tar -xzf geckodriver.tar.gz
            chmod +x geckodriver
            sudo mv geckodriver /usr/local/bin/
            rm geckodriver.tar.gz

      - name: Search Chapter
        env:
          smtp_pass: ${{ secrets.SMTP_PASS }}
          db_name: ${{ secrets.DB_NAME }}
        run: venv/bin/python chapter_search.py
